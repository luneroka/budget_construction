name: Backend tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5435/budget_construction_test
      SECRET_KEY: test_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: test
      R2_ENDPOINT_URL: http://localhost:9000
      R2_ACCESS_KEY_ID: test
      R2_SECRET_ACCESS_KEY: test
      R2_BUCKET_NAME: test-bucket

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: budget_construction_test
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d budget_construction_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run pytest
        run: uv run pytest
