services:
  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - '5173:5173'
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      # Must match the host the browser loads the SPA from (localhost, not
      # 127.0.0.1): they are different sites to the browser, so a mismatch
      # breaks the SameSite=Lax refresh cookie on cross-site XHRs.
      VITE_API_BASE_URL: 'http://localhost:8000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  backend:
    volumes:
      - ./backend:/app
      - ./analytics:/analytics:ro
      - backend_venv:/app/.venv
    build:
      context: ./backend
      target: development
    ports:
      - '8000:8000'
    environment:
      APP_URL: http://localhost:5173
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
        - action: rebuild
          path: ./backend/pyproject.toml
    env_file: .env
    depends_on:
      - db

  db:
    image: postgres:15
    env_file: .env
    ports:
      - '5434:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  db-test:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: budget_construction_test
    ports:
      - '5435:5432'
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  db_data:
  backend_venv:
