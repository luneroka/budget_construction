services:
  backend:
    volumes:
      - ./backend:/app
      - ./analytics:/analytics:ro
      - backend_venv:/app/.venv
    build:
      context: ./backend
    ports:
      - '8000:8000'
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
        - action: rebuild
          path: ./backend/pyproject.toml
    env_file: .env
    depends_on:
      - db

  db:
    image: postgres:15
    env_file: .env
    ports:
      - '5434:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  db-test:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: budget_construction_test
    ports:
      - '5435:5432'
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  db_data:
  backend_venv:
